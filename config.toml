[keys]
# Prefix used before Herdr-specific shortcuts.
prefix = "ctrl+a"

# Open the workspace navigation picker directly.
workspace_picker = "ctrl+w"

[[keys.command]]
# Open a temporary lazygit pane from the current workspace.
key = "prefix+ctrl+g"
type = "pane"
command = "lazygit"

[[keys.command]]
# Open a temporary Neovim pane from the current workspace.
key = "prefix+ctrl+e"
type = "pane"
command = "nvim"

[theme]

[theme.custom]
# Base terminal-aligned surfaces.
panel_bg = "#020b16"
surface_dim = "#030d18"
surface0 = "#04111e"
surface1 = "#071827"
overlay0 = "#1b3144"
overlay1 = "#294056"

# Cold text palette.
text = "#c8d7e8"
subtext0 = "#8ea3b8"

# Workspace and agent status colors.
green = "#a5e9ff"
yellow = "#4f8cff"

# Tab and accent colors.
accent = "#2f5f78"
blue = "#2f5f78"
teal = "#67d4e8"
mauve = "#8fa8c8"
